name: Daily Shortform Crawl

# 매일 12회 cron (2시간 간격) — 사장님 누적 가속 + GitHub schedule 누락 보완
# UTC 시간 — 한국 +9시간
# Public repo: Actions 사용 무제한이라 빈도 늘려도 비용 0
on:
  schedule:
    - cron: '0 16 * * *'  # KST 01시
    - cron: '0 18 * * *'  # KST 03시
    - cron: '0 20 * * *'  # KST 05시
    - cron: '0 22 * * *'  # KST 07시
    - cron: '0 0 * * *'   # KST 09시
    - cron: '0 2 * * *'   # KST 11시
    - cron: '0 4 * * *'   # KST 13시
    - cron: '0 6 * * *'   # KST 15시
    - cron: '0 8 * * *'   # KST 17시
    - cron: '0 10 * * *'  # KST 19시
    - cron: '0 12 * * *'  # KST 21시
    - cron: '0 14 * * *'  # KST 23시
  workflow_dispatch:  # 수동 trigger 가능

# 동시 실행 방지 (한 cron 끝나기 전 다음 cron skip)
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # cron 25분 hard limit (Actions runner)
    permissions:
      contents: write    # git push 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests scrapetube instaloader
          # yt-dlp CLI
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Run crawler
        run: |
          python -u crawler.py --all --fast --output "trending_results_$(date +%Y-%m-%d_%H%M)_actions.json"

      - name: Merge to pool
        run: |
          python merge_trending.py

      - name: Regression tests (회귀 자동 검증)
        run: |
          # 매 cron 후 자동 회귀 — 같은 문제 반복 방지
          # 실패해도 push 계속 진행 (수집 결과는 잃지 말기)
          if [ -f regression_tests.py ]; then
            python3 regression_tests.py 2>&1 | tail -30 || echo "회귀 일부 실패 — 다음 cron 재검증"
          fi

      - name: Commit + push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trending_videos.js trending_results_*.json
          git diff --cached --quiet && echo "변경 없음 — skip" && exit 0 || true
          git commit -m "🤖 Auto crawl $(date -u +%Y-%m-%d_%H:%MZ)"
          # remote 가 앞서있을 수 있음 (다른 commit 끼어들기). 최대 5회 rebase + push 재시도.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push 거부됨 — rebase 재시도 $i"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "5회 시도 실패"
          exit 1
